<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Vocabulary Speaking Practice</title>
<style>
  /* ── Morandi accent palette ──────────────────────────────────────────────
     sage   #9aab98   dusty-rose #b89898   sand  #c4a882
     slate  #8fa3b1   lavender   #a8a0ba
  ──────────────────────────────────────────────────────────────────────── */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    color: #e4e4e4;
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 32px 16px 48px;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 32px;
    text-align: center;
  }

  #app {
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  /* ── Card ───────────────────────────────────────────────────────────────── */
  .card {
    width: 100%;
    background: #1a1a1a;
    border-radius: 16px;
    padding: 32px 28px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    border: 1px solid #242424;
  }

  .label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #444;
    text-align: center;
  }

  .translation {
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.2;
    color: #f0f0f0;
    text-align: center;
  }

  .example {
    font-size: 0.9rem;
    color: #777;
    line-height: 1.7;
    font-style: italic;
    text-align: center;
    border-top: 1px solid #242424;
    padding-top: 16px;
    width: 100%;
  }

  /* ── Audio buttons (Word / Sentence / Slow) ─────────────────────────────── */
  .speak-row {
    display: flex;
    gap: 8px;
    width: 100%;
  }

  .speak-row button {
    flex: 1;
    padding: 10px 0;
    font-size: 0.82rem;
    background: #111;
    color: #c8c8c8;
    border: 1px solid #2e2e2e;
    border-radius: 8px;
    letter-spacing: 0.03em;
  }

  .speak-row button:hover:not(:disabled) {
    background: #1e1e1e;
    border-color: #3a3a3a;
    color: #fff;
  }

  .speak-row button.speaking {
    border-color: #8fa3b1;
    color: #8fa3b1;
  }

  #btn-speed.slow {
    border-color: #9aab98;
    color: #9aab98;
  }

  /* ── Result ─────────────────────────────────────────────────────────────── */
  .result-box {
    width: 100%;
    background: #1a1a1a;
    border-radius: 12px;
    padding: 16px 20px;
    min-height: 60px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    font-size: 1rem;
    transition: border 0.25s;
    border: 1px solid #242424;
  }

  .result-box.correct { border-color: #9aab98; }
  .result-box.wrong   { border-color: #b89898; }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .result-icon { font-size: 1.2rem; }

  .result-title { font-weight: 600; font-size: 1rem; }
  .result-box.correct .result-title { color: #9aab98; }
  .result-box.wrong   .result-title { color: #b89898; }

  /* ── Diff detail ─────────────────────────────────────────────────────────── */
  .diff-detail {
    font-size: 0.85rem;
    color: #888;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-top: 8px;
    border-top: 1px solid #242424;
  }

  .diff-row { display: flex; gap: 10px; align-items: baseline; }
  .diff-label { color: #444; min-width: 72px; font-size: 0.75rem; text-align: right; }
  .diff-word { font-family: monospace; font-size: 0.95rem; letter-spacing: 0.04em; }

  .diff-correct    { color: #e4e4e4; }
  .diff-wrong-char { color: #b89898; font-weight: 700; text-decoration: underline; }
  .diff-missing    { color: #3a3a3a; }

  /* ── Main buttons row ───────────────────────────────────────────────────── */
  .btn-row {
    display: flex;
    gap: 10px;
    width: 100%;
  }

  button {
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  button:active  { transform: scale(0.97); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }

  #btn-record {
    flex: 1;
    padding: 15px;
    font-size: 0.95rem;
    background: #1e1e1e;
    color: #e4e4e4;
    border: 1px solid #2e2e2e;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  #btn-record:hover:not(:disabled) { background: #252525; }

  #btn-record.recording {
    background: #1e1e1e;
    border-color: #b89898;
    color: #b89898;
    animation: pulse 1.4s infinite;
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(184,152,152,0.4); }
    70%  { box-shadow: 0 0 0 10px rgba(184,152,152,0); }
    100% { box-shadow: 0 0 0 0 rgba(184,152,152,0); }
  }

  #btn-next {
    padding: 15px 20px;
    font-size: 0.88rem;
    background: #111;
    color: #555;
    border: 1px solid #242424;
  }

  #btn-next:hover:not(:disabled) { background: #1a1a1a; color: #ccc; border-color: #333; }

  /* ── Stats ──────────────────────────────────────────────────────────────── */
  .stats {
    width: 100%;
    background: #141414;
    border-radius: 12px;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.82rem;
    color: #555;
    border: 1px solid #1e1e1e;
  }

  .stats strong { color: #ccc; }

  .rate { font-size: 1.3rem; font-weight: 700; }
  .rate.good { color: #9aab98; }
  .rate.ok   { color: #c4a882; }
  .rate.bad  { color: #b89898; }

  /* ── Misc ───────────────────────────────────────────────────────────────── */
  #interim {
    font-size: 0.8rem;
    color: #444;
    text-align: center;
    min-height: 18px;
  }

  .notice {
    background: #1a1414;
    border: 1px solid #3a2424;
    border-radius: 10px;
    padding: 20px;
    color: #b89898;
    font-size: 0.9rem;
    line-height: 1.6;
    text-align: center;
    width: 100%;
  }

  #word-counter {
    font-size: 0.75rem;
    color: #3a3a3a;
    text-align: center;
    width: 100%;
  }

  /* ── Mode toggle ────────────────────────────────────────────────────────── */
  .mode-toggle {
    display: flex;
    width: 100%;
    background: #111;
    border-radius: 8px;
    padding: 3px;
    border: 1px solid #242424;
  }

  .mode-btn {
    flex: 1;
    padding: 9px;
    font-size: 0.82rem;
    font-weight: 600;
    background: transparent;
    color: #444;
    border: none;
    border-radius: 6px;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .mode-btn.active {
    background: #1e1e1e;
    color: #e4e4e4;
  }

  /* sentence mode — highlight the example more */
  .example.target {
    color: #c8c8c8;
    font-style: normal;
    border-top-color: #8fa3b1;
  }
</style>
</head>
<body>

<h1>English Vocabulary Speaking Practice</h1>

<div id="app">
  <p id="loading" style="color:#666;text-align:center;">Loading words…</p>
</div>

<script>
// ── CSV parser ──────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = splitCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h.trim()] = (vals[i] || '').trim(); });
    return obj;
  }).filter(r => r['Word']);
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
      else inQuote = !inQuote;
    } else if (c === ',' && !inQuote) {
      result.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  result.push(cur);
  return result;
}

// ── Speech Recognition setup ────────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

// ── State ────────────────────────────────────────────────────────────────────
let words = [];
let current = null;
let usedIndices = new Set();
let stats = { correct: 0, total: 0 };
let recognition = null;
let isRecording = false;
let speechRate = 1.0;
let practiceMode = 'word'; // 'word' | 'sentence'

// ── DOM refs ─────────────────────────────────────────────────────────────────
const app = document.getElementById('app');

// ── Build UI ─────────────────────────────────────────────────────────────────
function buildUI() {
  app.innerHTML = `
    <div id="word-counter"></div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-word" onclick="setMode('word')">Word</button>
      <button class="mode-btn" id="mode-sentence" onclick="setMode('sentence')">Sentence</button>
    </div>
    <div class="card">
      <div style="text-align:center;width:100%;">
        <div class="label" style="margin-bottom:10px;">Translation</div>
        <div class="translation" id="translation"></div>
      </div>
      <div style="width:100%;">
        <div class="label" id="example-label" style="margin-bottom:10px;text-align:center;">Example — say the word aloud</div>
        <div class="example" id="example"></div>
      </div>
      <div class="speak-row">
        <button id="btn-speak">🔊 Word</button>
        <button id="btn-speak-sentence">🔊 Sentence</button>
        <button id="btn-speed">🐢 Slow</button>
      </div>
    </div>

    <div class="result-box" id="result-box"></div>
    <div id="interim"></div>

    <div class="btn-row">
      <button id="btn-record">🎤 Hold to Speak</button>
      <button id="btn-next">Next →</button>
    </div>

    <div class="stats">
      <div>
        <div style="margin-bottom:2px">Correct <strong id="s-correct">0</strong> / Total <strong id="s-total">0</strong></div>
        <div style="font-size:0.78rem;">Session stats</div>
      </div>
      <div class="rate" id="s-rate">—</div>
    </div>
  `;

  document.getElementById('btn-speak').addEventListener('click', speakWord);
  document.getElementById('btn-speak-sentence').addEventListener('click', speakSentence);
  document.getElementById('btn-speed').addEventListener('click', toggleSpeed);

  document.getElementById('btn-record').addEventListener('mousedown', startRecording);
  document.getElementById('btn-record').addEventListener('touchstart', e => { e.preventDefault(); startRecording(); });
  document.getElementById('btn-record').addEventListener('mouseup', stopRecording);
  document.getElementById('btn-record').addEventListener('touchend', e => { e.preventDefault(); stopRecording(); });
  document.getElementById('btn-record').addEventListener('mouseleave', () => { if (isRecording) stopRecording(); });

  document.getElementById('btn-next').addEventListener('click', nextWord);

  nextWord();
}

// ── Mode ──────────────────────────────────────────────────────────────────────
function setMode(mode) {
  practiceMode = mode;
  document.getElementById('mode-word').classList.toggle('active', mode === 'word');
  document.getElementById('mode-sentence').classList.toggle('active', mode === 'sentence');

  const exLabel = document.getElementById('example-label');
  const exEl = document.getElementById('example');
  if (mode === 'sentence') {
    exLabel.textContent = 'Say this sentence aloud';
    exEl.classList.add('target');
  } else {
    exLabel.textContent = 'Example — say the word aloud';
    exEl.classList.remove('target');
  }

  // reset result & re-enable record
  document.getElementById('result-box').className = 'result-box';
  document.getElementById('result-box').innerHTML = '';
  document.getElementById('interim').textContent = '';
  const btn = document.getElementById('btn-record');
  btn.disabled = false;
  btn.textContent = '🎤 Hold to Speak';
  btn.classList.remove('recording');
}

// ── Word logic ────────────────────────────────────────────────────────────────
function pickRandom() {
  if (usedIndices.size >= words.length) usedIndices.clear();
  let idx;
  do { idx = Math.floor(Math.random() * words.length); } while (usedIndices.has(idx));
  usedIndices.add(idx);
  return words[idx];
}

function nextWord() {
  if (isRecording) stopRecording();
  current = pickRandom();

  document.getElementById('translation').textContent = current['Translation/Explanation'] || current['Translation'] || '—';
  document.getElementById('example').textContent = current['Example Sentence'] || '(no example sentence)';
  document.getElementById('result-box').className = 'result-box';
  document.getElementById('result-box').innerHTML = '';
  document.getElementById('interim').textContent = '';
  document.getElementById('word-counter').textContent =
    `Practiced ${stats.total} · Library: ${words.length} words`;

  const btn = document.getElementById('btn-record');
  btn.disabled = false;
  btn.textContent = '🎤 Hold to Speak';
  btn.classList.remove('recording');
}

// ── SpeechSynthesis ──────────────────────────────────────────────────────────
function toggleSpeed() {
  const btn = document.getElementById('btn-speed');
  if (speechRate === 1.0) {
    speechRate = 0.5;
    btn.textContent = '🐢 Slow ✓';
    btn.classList.add('slow');
  } else {
    speechRate = 1.0;
    btn.textContent = '🐢 Slow';
    btn.classList.remove('slow');
  }
}

function speakWord() {
  if (!current) return;
  if (!window.speechSynthesis) return;

  window.speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(current['Word']);
  utter.lang = 'en-US';
  utter.rate = speechRate;

  const btn = document.getElementById('btn-speak');
  btn.classList.add('speaking');
  btn.disabled = true;

  utter.onend = () => {
    btn.classList.remove('speaking');
    btn.disabled = false;
  };
  utter.onerror = () => {
    btn.classList.remove('speaking');
    btn.disabled = false;
  };

  window.speechSynthesis.speak(utter);
}

function speakSentence() {
  if (!current || !window.speechSynthesis) return;
  const sentence = current['Example Sentence'];
  if (!sentence) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(sentence);
  utter.lang = 'en-US';
  utter.rate = speechRate;
  const btn = document.getElementById('btn-speak-sentence');
  btn.classList.add('speaking');
  btn.disabled = true;
  utter.onend = () => { btn.classList.remove('speaking'); btn.disabled = false; };
  utter.onerror = () => { btn.classList.remove('speaking'); btn.disabled = false; };
  window.speechSynthesis.speak(utter);
}

// ── Recording ─────────────────────────────────────────────────────────────────
function startRecording() {
  if (isRecording) return;
  if (!SR) return;

  isRecording = true;
  const btn = document.getElementById('btn-record');
  btn.classList.add('recording');
  btn.textContent = '🔴 Listening…';

  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = true;
  recognition.maxAlternatives = 3;
  recognition.continuous = false;

  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    if (interim) document.getElementById('interim').textContent = interim;
    if (final) processResult(final);
  };

  recognition.onerror = (e) => {
    console.warn('SR error', e.error);
    resetRecordBtn();
    if (e.error === 'no-speech') {
      document.getElementById('interim').textContent = 'No speech detected, please try again';
    }
  };

  recognition.onend = () => { resetRecordBtn(); };

  recognition.start();
}

function stopRecording() {
  if (!isRecording || !recognition) return;
  recognition.stop();
}

function resetRecordBtn() {
  isRecording = false;
  const btn = document.getElementById('btn-record');
  if (!btn) return;
  btn.classList.remove('recording');
  btn.textContent = '🎤 Hold to Speak';
}

// ── Comparison ────────────────────────────────────────────────────────────────
function normalize(s) {
  return s.toLowerCase().trim().replace(/[^a-z\s'-]/g, '');
}

// Pick the word from transcript closest to answer (edit-distance heuristic)
function bestMatchWord(transcript, answer) {
  const parts = normalize(transcript).split(/\s+/);
  if (parts.length === 1) return parts[0];
  return parts.reduce((best, w) => {
    return charSimilarity(w, answer) >= charSimilarity(best, answer) ? w : best;
  }, parts[0]);
}

function charSimilarity(a, b) {
  let matches = 0;
  const len = Math.max(a.length, b.length);
  for (let i = 0; i < Math.min(a.length, b.length); i++) {
    if (a[i] === b[i]) matches++;
  }
  return len === 0 ? 1 : matches / len;
}

// Returns HTML string with wrong chars highlighted
function buildDiffHTML(word, answer) {
  const maxLen = Math.max(word.length, answer.length);
  let html = '';
  for (let i = 0; i < maxLen; i++) {
    const wc = word[i];
    const ac = answer[i];
    if (!wc) {
      html += `<span class="diff-missing">_</span>`;
    } else if (wc === ac) {
      html += `<span class="diff-correct">${wc}</span>`;
    } else {
      html += `<span class="diff-wrong-char">${wc}</span>`;
    }
  }
  return html;
}

function buildAnswerDiffHTML(word, answer) {
  const maxLen = Math.max(word.length, answer.length);
  let html = '';
  for (let i = 0; i < maxLen; i++) {
    const wc = word[i];
    const ac = answer[i];
    if (!ac) {
      html += `<span class="diff-missing">_</span>`;
    } else if (wc === ac) {
      html += `<span class="diff-correct">${ac}</span>`;
    } else {
      html += `<span class="diff-wrong-char">${ac}</span>`;
    }
  }
  return html;
}

function processResult(transcript) {
  if (!current) return;
  stats.total++;

  let correct;
  if (practiceMode === 'sentence') {
    const answer = normalize(current['Example Sentence'] || '');
    const spoken = normalize(transcript);
    const aWords = answer.split(/\s+/).filter(Boolean);
    const sWords = spoken.split(/\s+/).filter(Boolean);
    const matched = aWords.filter(w => sWords.includes(w)).length;
    correct = aWords.length > 0 && matched / aWords.length >= 0.8;
  } else {
    const answer = normalize(current['Word']);
    const spoken = normalize(transcript);
    correct = spoken === answer || spoken.split(/\s+/).includes(answer);
  }

  if (correct) stats.correct++;
  showResult(correct, transcript.trim());
  updateStats();
  resetRecordBtn();
  document.getElementById('btn-record').disabled = true;
}

function showResult(correct, spokenRaw) {
  const box = document.getElementById('result-box');
  const answer = normalize(current['Word']);

  if (correct) {
    box.className = 'result-box correct';
    box.innerHTML = `
      <div class="result-header">
        <span class="result-icon">✅</span>
        <span class="result-title">Correct! Great pronunciation!</span>
      </div>`;
  } else {
    const spokenNorm = normalize(spokenRaw);
    const bestWord = bestMatchWord(spokenRaw, answer);

    const spokenDiffHTML = buildDiffHTML(bestWord, answer);
    const answerDiffHTML = buildAnswerDiffHTML(bestWord, answer);

    box.className = 'result-box wrong';
    box.innerHTML = `
      <div class="result-header">
        <span class="result-icon">❌</span>
        <span class="result-title">Try again</span>
      </div>
      <div class="diff-detail">
        <div class="diff-row">
          <span class="diff-label">You said:</span>
          <span class="diff-word">${spokenDiffHTML}</span>
        </div>
        <div class="diff-row">
          <span class="diff-label">Correct:</span>
          <span class="diff-word">${answerDiffHTML}</span>
        </div>
      </div>`;
  }
}

function updateStats() {
  document.getElementById('s-correct').textContent = stats.correct;
  document.getElementById('s-total').textContent = stats.total;
  const pct = stats.total ? Math.round(stats.correct / stats.total * 100) : null;
  const rateEl = document.getElementById('s-rate');
  if (pct === null) { rateEl.textContent = '—'; rateEl.className = 'rate'; return; }
  rateEl.textContent = pct + '%';
  rateEl.className = 'rate ' + (pct >= 80 ? 'good' : pct >= 50 ? 'ok' : 'bad');
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  if (!SR) {
    app.innerHTML = `<div class="notice">
      ⚠️ Your browser does not support the Speech Recognition API.<br><br>
      Please open this page in <strong>Google Chrome</strong>.
    </div>`;
    return;
  }

  try {
    const resp = await fetch('./notebooklm_words.csv');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    words = parseCSV(text);
    if (words.length === 0) throw new Error('CSV 無有效資料');
    buildUI();
  } catch (err) {
    app.innerHTML = `<div class="notice">
      ⚠️ Failed to load vocabulary file.<br><br>
      Please confirm <code>notebooklm_words.csv</code> exists in the same directory.<br>
      <small style="color:#888;">(${err.message})</small>
    </div>`;
  }
}

init();
</script>
</body>
</html>
