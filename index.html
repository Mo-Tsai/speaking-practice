<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaking Practice · English Vocabulary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0f0f0f;
  --surf:    #161616;
  --ring:    rgba(255,255,255,0.06);
  --ring-in: rgba(255,255,255,0.05);
  --div:     rgba(255,255,255,0.05);
  --text:    #e8e8e8;
  --sub:     #888;
  --muted:   #555;
  --faint:   #2e2e2e;
  --sage:    #8a9e89;
  --rose:    #a88585;
  --sand:    #b89870;
  --slate:   #7d94a6;
  --r-app:   20px;
  --r-pill:  9999px;
  --btn-h:   38px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: "Inter", system-ui, -apple-system, sans-serif;
  font-weight: 450; font-feature-settings: "ss02" 0, "cv05" 1;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 40px 20px 60px;
}
#app { width: 100%; max-width: 460px; display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
.page-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; width: 100%; }
.page-title { font-size: 1rem; font-weight: 650; letter-spacing: -0.015em; color: var(--text); }
.page-sub   { font-size: 0.875rem; font-weight: 400; color: var(--muted); }

/* ── Score panel ── */
.score-panel {
  width: 100%; background: var(--surf); border-radius: 14px;
  padding: 14px 18px; display: flex; align-items: center; gap: 0;
  box-shadow: inset 0 0 0 1px var(--ring-in);
}
.score-group { display: flex; gap: 16px; flex: 1; }
.score-item { display: flex; flex-direction: column; gap: 2px; }
.score-label { font-family: ui-monospace, monospace; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); }
.score-val { font-size: 1.1rem; font-weight: 650; letter-spacing: -0.04em; color: var(--text); }
.score-val.good { color: var(--sage); }
.score-val.bad  { color: var(--rose); }
.score-val.rate-good { color: var(--sage); }
.score-val.rate-ok   { color: var(--sand); }
.score-val.rate-bad  { color: var(--rose); }
#btn-reset {
  height: 28px; padding: 0 12px; font-family: inherit; font-size: 0.7rem;
  font-weight: 500; letter-spacing: 0.03em; background: transparent;
  color: var(--muted); border-radius: var(--r-pill);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.07);
  transition: color 0.12s, box-shadow 0.12s;
}
#btn-reset:hover { color: var(--rose); box-shadow: inset 0 0 0 1px rgba(168,133,133,0.3); }

/* ── Progress counter ── */
#word-counter { font-size: 0.75rem; color: var(--faint); line-height: 2; width: 100%; }

/* ── Practice mode toggle ── */
.mode-toggle {
  display: flex; width: 100%; background: var(--surf);
  border-radius: 10px; padding: 3px;
  box-shadow: inset 0 0 0 1px var(--ring-in);
}
.mode-btn {
  flex: 1; height: 32px; padding: 0; font-family: inherit;
  font-size: 0.8rem; font-weight: 550; font-feature-settings: "ss02" 0;
  background: transparent; color: var(--muted); border: none;
  border-radius: 7px; letter-spacing: 0.02em; cursor: pointer;
  transition: background 0.15s, color 0.15s, box-shadow 0.15s;
}
.mode-btn.active {
  background: #222; color: var(--text);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 1px 4px rgba(0,0,0,0.5);
}

/* ── Card mode selector ── */
.card-mode-row {
  width: 100%; display: flex; gap: 6px; flex-wrap: wrap;
}
.card-mode-btn {
  flex: 1; min-width: 0; height: 30px; padding: 0 8px; font-family: inherit;
  font-size: 0.72rem; font-weight: 500; letter-spacing: 0.02em;
  background: var(--surf); color: var(--muted); border: none;
  border-radius: 8px; cursor: pointer;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
  transition: background 0.15s, color 0.15s, box-shadow 0.15s;
  white-space: nowrap;
}
.card-mode-btn.active {
  background: #222; color: var(--text);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 1px 4px rgba(0,0,0,0.4);
}
.card-mode-btn:hover:not(.active) { color: var(--sub); }

.card {
  width: 100%; background: var(--surf); border-radius: var(--r-app);
  padding: 24px; display: flex; flex-direction: column;
  box-shadow: 0 0 0 1px var(--ring), 0 4px 20px rgba(0,0,0,0.5);
}
.card-block { padding: 16px 0; }
.card-block:first-child { padding-top: 0; }
.card-block:last-of-type { padding-bottom: 18px; }
.card-divider { height: 1px; background: var(--div); margin: 0 -24px; }
.eyebrow {
  font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
  font-size: 0.68rem; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px;
}

/* ── Word display with status dot ── */
.word-header { display: flex; align-items: center; gap: 10px; }
.status-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: var(--faint); margin-top: 3px;
  transition: background 0.2s;
}
.status-dot.correct { background: var(--sage); }
.status-dot.wrong   { background: var(--rose); }

.word-display {
  font-size: 2.2rem; font-weight: 650; line-height: 1.15;
  letter-spacing: -0.03em; color: #f4f4f4; text-wrap: balance;
}
.translation-toggle { padding: 14px 0 0; display: flex; flex-direction: column; gap: 8px; }
.trans-btn {
  align-self: flex-start; height: 24px; padding: 0 10px;
  font-family: inherit; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.04em;
  background: transparent; color: var(--muted); border-radius: var(--r-pill);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.07);
  transition: color 0.12s, box-shadow 0.12s; cursor: pointer;
}
.trans-btn:hover { color: var(--sub); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12); }
.translation {
  font-size: 0.85rem; font-weight: 400; color: var(--muted); line-height: 1.6;
}
.example {
  font-size: 0.9rem; font-weight: 400; color: var(--sub);
  line-height: 1.8; font-style: italic; text-wrap: pretty; max-width: 42ch;
}
.example.target { color: #d0d0d0; font-style: normal; }
.speak-row {
  display: flex; gap: 6px; width: 100%;
  border-top: 1px solid var(--div); padding-top: 18px;
}
.speak-row button {
  flex: 1; height: calc(var(--btn-h) - 4px); padding: 0;
  font-family: inherit; font-size: 0.78rem; font-weight: 550;
  background: var(--bg); color: #888; border: none;
  border-radius: var(--r-pill); letter-spacing: 0.01em; cursor: pointer;
  transition: background 0.12s, color 0.12s, box-shadow 0.12s;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.07);
}
.speak-row button:hover:not(:disabled) {
  background: #1c1c1c; color: var(--text);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.11);
}
.speak-row button.speaking { color: var(--slate); box-shadow: inset 0 0 0 1px var(--slate); }
#btn-speed.slow { color: var(--sage); box-shadow: inset 0 0 0 1px var(--sage); }
.result-box {
  width: 100%; background: var(--surf); border-radius: 14px;
  padding: 16px 20px; min-height: 56px; display: flex;
  flex-direction: column; gap: 10px; font-size: 0.9rem;
  transition: box-shadow 0.25s; box-shadow: inset 0 0 0 1px var(--ring-in);
}
.result-box.correct { box-shadow: inset 0 0 0 1px rgba(138,158,137,0.3), 0 0 0 1px rgba(138,158,137,0.08); }
.result-box.wrong   { box-shadow: inset 0 0 0 1px rgba(168,133,133,0.3), 0 0 0 1px rgba(168,133,133,0.08); }
.result-header { display: flex; align-items: center; gap: 8px; }
.result-icon { font-size: 1rem; }
.result-title { font-weight: 600; font-size: 0.88rem; letter-spacing: -0.01em; }
.result-box.correct .result-title { color: var(--sage); }
.result-box.wrong   .result-title { color: var(--rose); }
.diff-detail { font-size: 0.82rem; display: flex; flex-direction: column; gap: 5px; padding-top: 10px; border-top: 1px solid var(--div); }
.diff-row { display: flex; gap: 10px; align-items: baseline; }
.diff-label { font-family: ui-monospace, monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); min-width: 64px; }
.diff-word { font-family: ui-monospace, monospace; font-size: 0.88rem; letter-spacing: 0.02em; }
.diff-correct    { color: var(--text); }
.diff-wrong-char { color: var(--rose); font-weight: 700; }
.diff-missing    { color: #2a2a2a; }
#interim { font-size: 0.75rem; color: #333; line-height: 2; min-height: 28px; width: 100%; }
button {
  border: none; cursor: pointer;
  font-family: "Inter", system-ui, sans-serif; font-feature-settings: "ss02" 0;
  transition: background 0.12s, box-shadow 0.12s, color 0.12s, transform 0.08s;
  -webkit-tap-highlight-color: transparent;
}
button:active  { transform: scale(0.97); }
button:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-row { display: flex; gap: 8px; width: 100%; }
#btn-record {
  flex: 1; height: var(--btn-h); padding: 0 20px;
  font-size: 0.875rem; font-weight: 550; background: #1c1c1c; color: var(--text);
  border-radius: var(--r-pill); display: flex; align-items: center;
  justify-content: center; gap: 6px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 1px 5px rgba(0,0,0,0.5);
}
#btn-record:hover:not(:disabled) { background: #222; box-shadow: 0 0 0 1px rgba(255,255,255,0.12), 0 2px 10px rgba(0,0,0,0.5); }
#btn-record.recording {
  background: #1c1c1c; color: var(--rose);
  box-shadow: 0 0 0 1px rgba(168,133,133,0.3);
  animation: pulse 1.4s infinite;
}
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0   rgba(168,133,133,0.3), 0 0 0 1px rgba(168,133,133,0.3); }
  70%  { box-shadow: 0 0 0 8px rgba(168,133,133,0),   0 0 0 1px rgba(168,133,133,0.3); }
  100% { box-shadow: 0 0 0 0   rgba(168,133,133,0),   0 0 0 1px rgba(168,133,133,0.3); }
}
#btn-next {
  height: var(--btn-h); padding: 0 18px; font-size: 0.8rem; font-weight: 550;
  background: transparent; color: var(--muted); border-radius: var(--r-pill);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.07);
}
#btn-next:hover:not(:disabled) { background: #181818; color: var(--text); box-shadow: 0 0 0 1px rgba(255,255,255,0.1); }
.stats {
  width: 100%; background: var(--surf); border-radius: 14px;
  padding: 16px 20px; display: flex; justify-content: space-between;
  align-items: center; box-shadow: inset 0 0 0 1px var(--ring-in);
}
.stats-left { display: flex; flex-direction: column; gap: 3px; }
.stats-numbers { font-size: 0.82rem; color: var(--muted); line-height: 2; }
.stats-numbers strong { color: var(--text); font-weight: 600; }
.rate { font-size: 1.3rem; font-weight: 650; letter-spacing: -0.04em; }
.rate.good { color: var(--sage); }
.rate.ok   { color: var(--sand); }
.rate.bad  { color: var(--rose); }
.notice { background: var(--surf); border-radius: 14px; padding: 24px; color: var(--rose); font-size: 0.875rem; line-height: 2; width: 100%; box-shadow: inset 0 0 0 1px rgba(168,133,133,0.15); }
</style>
</head>
<body>
<div id="app">
  <p style="color:#333;font-size:0.8rem;line-height:2;width:100%;">Loading words…</p>
</div>
<script>
// ── CSV parser ──────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = splitCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h.trim()] = (vals[i] || '').trim(); });
    return obj;
  }).filter(r => r['Word']);
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
      else inQuote = !inQuote;
    } else if (c === ',' && !inQuote) {
      result.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  result.push(cur);
  return result;
}

// ── Speech Recognition setup ────────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

// ── localStorage ─────────────────────────────────────────────────────────────
const LS_KEY = 'speaking-practice-status';

function loadStatus() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }
  catch { return {}; }
}

function saveStatus() {
  localStorage.setItem(LS_KEY, JSON.stringify(wordStatus));
}

// ── State ────────────────────────────────────────────────────────────────────
let words = [];
let current = null;
let wordStatus = loadStatus(); // { 'word': 'correct' | 'wrong' }
let sessionQueue = [];
let sessionQueueIdx = 0;
let stats = { correct: 0, wrong: 0 };
let recognition = null;
let isRecording = false;
let practiceMode = 'word';
let cardMode = 'smart'; // 'smart' | 'all' | 'unlearned' | 'wrong'
let slowMode = false;

// ── DOM refs ─────────────────────────────────────────────────────────────────
const app = document.getElementById('app');

// ── Session queue ─────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQueue() {
  let pool;
  const unlIdx = words.map((_, i) => i).filter(i => !wordStatus[words[i]['Word']]);
  const wrgIdx = words.map((_, i) => i).filter(i => wordStatus[words[i]['Word']] === 'wrong');
  const allIdx = words.map((_, i) => i);

  if (cardMode === 'unlearned') {
    pool = unlIdx.length > 0 ? unlIdx : allIdx;
  } else if (cardMode === 'wrong') {
    pool = wrgIdx.length > 0 ? wrgIdx : allIdx;
  } else if (cardMode === 'smart') {
    if (unlIdx.length > 0) pool = unlIdx;
    else if (wrgIdx.length > 0) pool = wrgIdx;
    else pool = allIdx;
  } else {
    pool = allIdx;
  }

  sessionQueue = shuffle(pool);
  sessionQueueIdx = 0;
}

function pickNext() {
  if (sessionQueueIdx >= sessionQueue.length) buildQueue();
  return words[sessionQueue[sessionQueueIdx++]];
}

// ── Build UI ─────────────────────────────────────────────────────────────────
function buildUI() {
  app.innerHTML = `
    <header class="page-header">
      <span class="page-title">Speaking Practice</span>
      <span class="page-sub">English Vocabulary</span>
    </header>

    <!-- Score panel -->
    <div class="score-panel">
      <div class="score-group">
        <div class="score-item">
          <span class="score-label">答對</span>
          <span class="score-val good" id="sp-correct">0</span>
        </div>
        <div class="score-item">
          <span class="score-label">答錯</span>
          <span class="score-val bad" id="sp-wrong">0</span>
        </div>
        <div class="score-item">
          <span class="score-label">正確率</span>
          <span class="score-val" id="sp-rate">—</span>
        </div>
      </div>
      <button id="btn-reset">重置進度</button>
    </div>

    <!-- Progress counter -->
    <div id="word-counter"></div>

    <!-- Practice mode (Word / Sentence) -->
    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-word" onclick="setMode('word')">Word</button>
      <button class="mode-btn" id="mode-sentence" onclick="setMode('sentence')">Sentence</button>
    </div>

    <!-- Card selection mode -->
    <div class="card-mode-row" id="card-mode-row">
      <button class="card-mode-btn active" data-cmode="smart">智慧順序</button>
      <button class="card-mode-btn" data-cmode="all">全部隨機</button>
      <button class="card-mode-btn" data-cmode="unlearned">只出未練習</button>
      <button class="card-mode-btn" data-cmode="wrong">只出答錯</button>
    </div>

    <!-- Word card -->
    <div class="card">
      <div class="card-block">
        <div class="eyebrow">Word</div>
        <div class="word-header">
          <div class="word-display" id="word-display"></div>
          <div class="status-dot" id="status-dot"></div>
        </div>
      </div>
      <div class="card-divider"></div>
      <div class="card-block">
        <div class="eyebrow" id="example-label">Example · say the word aloud</div>
        <div class="example" id="example"></div>
      </div>
      <div class="translation-toggle">
        <button class="trans-btn" id="btn-trans" onclick="toggleTranslation()">Translation ▼</button>
        <div class="translation" id="translation" style="display:none"></div>
      </div>
      <div class="speak-row">
        <button id="btn-speak">🔊 Word</button>
        <button id="btn-speak-sentence">🔊 Sentence</button>
        <button id="btn-speed">🐢 Slow</button>
      </div>
    </div>

    <div class="result-box" id="result-box"></div>
    <div id="interim"></div>
    <div class="btn-row">
      <button id="btn-record">🎤 Hold to Speak</button>
      <button id="btn-next">Next →</button>
    </div>

    <!-- Session stats (bottom) -->
    <div class="stats">
      <div class="stats-left">
        <div class="eyebrow">Session</div>
        <div class="stats-numbers">Correct <strong id="s-correct">0</strong> / <strong id="s-total">0</strong></div>
      </div>
      <div class="rate" id="s-rate">—</div>
    </div>
  `;

  // Card mode buttons
  document.getElementById('card-mode-row').addEventListener('click', e => {
    const btn = e.target.closest('.card-mode-btn');
    if (!btn) return;
    const mode = btn.dataset.cmode;
    setCardMode(mode);
  });

  document.getElementById('btn-reset').addEventListener('click', resetProgress);
  document.getElementById('btn-speak').addEventListener('click', speakWord);
  document.getElementById('btn-speak-sentence').addEventListener('click', speakSentence);
  document.getElementById('btn-speed').addEventListener('click', toggleSpeed);

  const rec = document.getElementById('btn-record');
  rec.addEventListener('mousedown', startRecording);
  rec.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); });
  rec.addEventListener('mouseup', stopRecording);
  rec.addEventListener('touchend', e => { e.preventDefault(); stopRecording(); });
  rec.addEventListener('mouseleave', () => { if (isRecording) stopRecording(); });

  document.getElementById('btn-next').addEventListener('click', nextWord);

  buildQueue();
  nextWord();
}

// ── Card mode ─────────────────────────────────────────────────────────────────
function setCardMode(mode) {
  cardMode = mode;
  document.querySelectorAll('.card-mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cmode === mode);
  });
  buildQueue();
  nextWord();
}

// ── Word logic ─────────────────────────────────────────────────────────────────
function nextWord() {
  if (isRecording) stopRecording();
  current = pickNext();

  document.getElementById('word-display').textContent = current['Word'] || '—';

  // Status dot
  const dot = document.getElementById('status-dot');
  const st = wordStatus[current['Word']];
  dot.className = 'status-dot' + (st ? ' ' + st : '');

  const transEl = document.getElementById('translation');
  transEl.textContent = current['Translation/Explanation'] || current['Translation'] || '—';
  transEl.style.display = 'none';
  const transBtn = document.getElementById('btn-trans');
  if (transBtn) transBtn.textContent = 'Translation ▼';
  document.getElementById('example').textContent = current['Example Sentence'] || '(no example)';
  document.getElementById('result-box').className = 'result-box';
  document.getElementById('result-box').innerHTML = '';
  document.getElementById('interim').textContent = '';
  updateCounter();

  const btn = document.getElementById('btn-record');
  btn.disabled = false;
  btn.textContent = '🎤 Hold to Speak';
  btn.classList.remove('recording');
}

function updateCounter() {
  const total = words.length;
  const practiced = Object.keys(wordStatus).length;
  const correct = Object.values(wordStatus).filter(v => v === 'correct').length;
  const wrong = Object.values(wordStatus).filter(v => v === 'wrong').length;
  const unlearned = total - practiced;
  document.getElementById('word-counter').textContent =
    `已練習 ${practiced} / ${total}　·　未練習 ${unlearned}　·　答對 ${correct}　·　答錯 ${wrong}`;
}

// ── Reset progress ────────────────────────────────────────────────────────────
function resetProgress() {
  if (!confirm('確定要清除所有學習紀錄，重新開始嗎？')) return;
  wordStatus = {};
  localStorage.removeItem(LS_KEY);
  stats = { correct: 0, wrong: 0 };
  updateScorePanel();
  buildQueue();
  nextWord();
}

// ── Mode toggle ───────────────────────────────────────────────────────────────
function setMode(mode) {
  practiceMode = mode;
  document.getElementById('mode-word').classList.toggle('active', mode === 'word');
  document.getElementById('mode-sentence').classList.toggle('active', mode === 'sentence');
  const label = document.getElementById('example-label');
  if (label) label.textContent = mode === 'sentence'
    ? 'Example · say the full sentence'
    : 'Example · say the word aloud';
  const exEl = document.getElementById('example');
  if (exEl) exEl.classList.toggle('target', mode === 'sentence');
}

// ── Translation toggle ────────────────────────────────────────────────────────
function toggleTranslation() {
  const el = document.getElementById('translation');
  const btn = document.getElementById('btn-trans');
  const visible = el.style.display !== 'none';
  el.style.display = visible ? 'none' : 'block';
  btn.textContent = visible ? 'Translation ▼' : 'Translation ▲';
}

// ── SpeechSynthesis ──────────────────────────────────────────────────────────
function speakWord() {
  if (!current || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(current['Word']);
  utter.lang = 'en-US';
  utter.rate = slowMode ? 0.5 : 1.0;
  const btn = document.getElementById('btn-speak');
  btn.classList.add('speaking'); btn.disabled = true;
  utter.onend = utter.onerror = () => { btn.classList.remove('speaking'); btn.disabled = false; };
  window.speechSynthesis.speak(utter);
}

function speakSentence() {
  if (!current || !window.speechSynthesis) return;
  const sentence = current['Example Sentence'];
  if (!sentence) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(sentence);
  utter.lang = 'en-US';
  utter.rate = slowMode ? 0.5 : 1.0;
  const btn = document.getElementById('btn-speak-sentence');
  btn.classList.add('speaking'); btn.disabled = true;
  utter.onend = utter.onerror = () => { btn.classList.remove('speaking'); btn.disabled = false; };
  window.speechSynthesis.speak(utter);
}

function toggleSpeed() {
  slowMode = !slowMode;
  const btn = document.getElementById('btn-speed');
  btn.textContent = slowMode ? '🐢 Slow' : '▶ Normal';
  btn.classList.toggle('slow', slowMode);
}

// ── Recording ─────────────────────────────────────────────────────────────────
function startRecording() {
  if (isRecording || !SR) return;
  isRecording = true;
  const btn = document.getElementById('btn-record');
  btn.classList.add('recording');
  btn.textContent = '🔴 Listening…';

  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = true;
  recognition.maxAlternatives = 3;
  recognition.continuous = false;

  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    if (interim) document.getElementById('interim').textContent = interim;
    if (final) processResult(final);
  };

  recognition.onerror = (e) => {
    console.warn('SR error', e.error);
    resetRecordBtn();
    if (e.error === 'no-speech') {
      document.getElementById('interim').textContent = 'No speech detected, please try again.';
    }
  };

  recognition.onend = () => { resetRecordBtn(); };
  recognition.start();
}

function stopRecording() {
  if (!isRecording || !recognition) return;
  recognition.stop();
}

function resetRecordBtn() {
  isRecording = false;
  const btn = document.getElementById('btn-record');
  if (!btn) return;
  btn.classList.remove('recording');
  btn.textContent = '🎤 Hold to Speak';
}

// ── Comparison ────────────────────────────────────────────────────────────────
function normalize(s) {
  return s.toLowerCase().trim().replace(/[^a-z\s'-]/g, '');
}

function bestMatchWord(transcript, answer) {
  const parts = normalize(transcript).split(/\s+/);
  if (parts.length === 1) return parts[0];
  return parts.reduce((best, w) =>
    charSimilarity(w, answer) >= charSimilarity(best, answer) ? w : best, parts[0]);
}

function charSimilarity(a, b) {
  let matches = 0;
  const len = Math.max(a.length, b.length);
  for (let i = 0; i < Math.min(a.length, b.length); i++) {
    if (a[i] === b[i]) matches++;
  }
  return len === 0 ? 1 : matches / len;
}

function buildDiffHTML(word, answer) {
  const maxLen = Math.max(word.length, answer.length);
  let html = '';
  for (let i = 0; i < maxLen; i++) {
    const wc = word[i], ac = answer[i];
    if (!wc) html += `<span class="diff-missing">_</span>`;
    else if (wc === ac) html += `<span class="diff-correct">${wc}</span>`;
    else html += `<span class="diff-wrong-char">${wc}</span>`;
  }
  return html;
}

function buildAnswerDiffHTML(word, answer) {
  const maxLen = Math.max(word.length, answer.length);
  let html = '';
  for (let i = 0; i < maxLen; i++) {
    const wc = word[i], ac = answer[i];
    if (!ac) html += `<span class="diff-missing">_</span>`;
    else if (wc === ac) html += `<span class="diff-correct">${ac}</span>`;
    else html += `<span class="diff-wrong-char">${ac}</span>`;
  }
  return html;
}

function processResult(transcript) {
  if (!current) return;

  let correct;
  if (practiceMode === 'sentence') {
    const answerWords = normalize(current['Example Sentence'] || '').split(/\s+/).filter(Boolean);
    const spokenWords = new Set(normalize(transcript).split(/\s+/).filter(Boolean));
    const matched = answerWords.filter(w => spokenWords.has(w)).length;
    correct = answerWords.length > 0 && matched / answerWords.length >= 0.85;
  } else {
    const answer = normalize(current['Word']);
    const spoken = normalize(transcript);
    correct = spoken === answer || spoken.split(/\s+/).includes(answer);
  }

  // Update session stats
  if (correct) stats.correct++; else stats.wrong++;

  // Update localStorage status (most recent answer wins)
  wordStatus[current['Word']] = correct ? 'correct' : 'wrong';
  saveStatus();

  // Update status dot
  const dot = document.getElementById('status-dot');
  if (dot) { dot.className = 'status-dot ' + (correct ? 'correct' : 'wrong'); }

  showResult(correct, transcript.trim());
  updateScorePanel();
  updateCounter();
  // Also update legacy stats bar
  const total = stats.correct + stats.wrong;
  document.getElementById('s-correct').textContent = stats.correct;
  document.getElementById('s-total').textContent = total;
  const pct = total ? Math.round(stats.correct / total * 100) : null;
  const rateEl = document.getElementById('s-rate');
  if (pct === null) { rateEl.textContent = '—'; rateEl.className = 'rate'; }
  else { rateEl.textContent = pct + '%'; rateEl.className = 'rate ' + (pct >= 80 ? 'good' : pct >= 50 ? 'ok' : 'bad'); }

  resetRecordBtn();
  document.getElementById('btn-record').disabled = true;
}

function updateScorePanel() {
  const total = stats.correct + stats.wrong;
  document.getElementById('sp-correct').textContent = stats.correct;
  document.getElementById('sp-wrong').textContent = stats.wrong;
  const rateEl = document.getElementById('sp-rate');
  if (total === 0) { rateEl.textContent = '—'; rateEl.className = 'score-val'; return; }
  const pct = Math.round(stats.correct / total * 100);
  rateEl.textContent = pct + '%';
  rateEl.className = 'score-val ' + (pct >= 80 ? 'rate-good' : pct >= 50 ? 'rate-ok' : 'rate-bad');
}

function showResult(correct, spokenRaw) {
  const box = document.getElementById('result-box');
  if (correct) {
    box.className = 'result-box correct';
    box.innerHTML = `
      <div class="result-header">
        <span class="result-icon">✅</span>
        <span class="result-title">Correct! Great pronunciation!</span>
      </div>`;
    return;
  }
  box.className = 'result-box wrong';
  if (practiceMode === 'sentence') {
    const answerWords = normalize(current['Example Sentence'] || '').split(/\s+/).filter(Boolean);
    const spokenWords = normalize(spokenRaw).split(/\s+/).filter(Boolean);
    const spokenSet = new Set(spokenWords);
    const answerHTML = answerWords.map(w =>
      spokenSet.has(w)
        ? `<span class="diff-correct">${w}</span>`
        : `<span class="diff-wrong-char">${w}</span>`
    ).join(' ');
    box.innerHTML = `
      <div class="result-header">
        <span class="result-icon">❌</span>
        <span class="result-title">Try again</span>
      </div>
      <div class="diff-detail">
        <div class="diff-row"><span class="diff-label">You said:</span><span class="diff-word" style="white-space:normal;line-height:1.6;">${normalize(spokenRaw)}</span></div>
        <div class="diff-row"><span class="diff-label">Correct:</span><span class="diff-word" style="white-space:normal;line-height:1.6;">${answerHTML}</span></div>
      </div>`;
  } else {
    const answer = normalize(current['Word']);
    const bestWord = bestMatchWord(spokenRaw, answer);
    box.innerHTML = `
      <div class="result-header">
        <span class="result-icon">❌</span>
        <span class="result-title">Try again</span>
      </div>
      <div class="diff-detail">
        <div class="diff-row"><span class="diff-label">You said:</span><span class="diff-word">${buildDiffHTML(bestWord, answer)}</span></div>
        <div class="diff-row"><span class="diff-label">Correct:</span><span class="diff-word">${buildAnswerDiffHTML(bestWord, answer)}</span></div>
      </div>`;
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  if (!SR) {
    app.innerHTML = `<div class="notice">
      ⚠️ 您的瀏覽器不支援語音辨識 API。<br><br>
      請使用 <strong>Google Chrome</strong> 瀏覽器開啟此頁面。
    </div>`;
    return;
  }
  try {
    const resp = await fetch('./notebooklm_words.csv');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    words = parseCSV(text);
    if (words.length === 0) throw new Error('CSV 無有效資料');
    buildUI();
  } catch (err) {
    app.innerHTML = `<div class="notice">
      ⚠️ 無法載入單字檔案。<br><br>
      請確認 <code>notebooklm_words.csv</code> 存在於同一目錄下。<br>
      <small style="color:#888;">(${err.message})</small>
    </div>`;
  }
}

init();
</script>
