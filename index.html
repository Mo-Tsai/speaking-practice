<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Vocabulary Speaking Practice</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a1a;
    color: #fff;
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
  }

  h1 {
    font-size: 1.25rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: #aaa;
    margin-bottom: 28px;
  }

  #app {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Card */
  .card {
    background: #252525;
    border-radius: 16px;
    padding: 32px 28px;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 18px;
  }

  .label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #666;
  }

  .translation {
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.2;
    color: #fff;
  }

  .example {
    font-size: 0.95rem;
    color: #999;
    line-height: 1.6;
    font-style: italic;
    border-left: 3px solid #333;
    padding-left: 12px;
  }

  /* Speak button */
  #btn-speak {
    align-self: flex-start;
    padding: 8px 16px;
    font-size: 0.88rem;
    background: #1e3a52;
    color: #7dd3fc;
    border: 1px solid #2a5a7a;
    border-radius: 8px;
  }
  #btn-speak:hover:not(:disabled) { background: #1a3048; }
  #btn-speak.speaking { background: #1a4a6a; color: #38bdf8; }

  #btn-speed {
    align-self: flex-start;
    padding: 5px 12px;
    font-size: 0.78rem;
    background: #2a2a2a;
    color: #888;
    border: 1px solid #444;
    border-radius: 6px;
  }
  #btn-speed.slow { background: #2a3520; color: #86efac; border-color: #4a7a40; }

  /* Result */
  .result-box {
    background: #252525;
    border-radius: 12px;
    padding: 18px 24px;
    min-height: 64px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    font-size: 1.05rem;
    transition: border 0.2s;
    border: 2px solid transparent;
  }

  .result-box.correct { border-color: #22c55e; }
  .result-box.wrong   { border-color: #f97316; }

  .result-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .result-icon { font-size: 1.3rem; }

  .result-title {
    font-weight: 700;
    font-size: 1.05rem;
  }
  .result-box.correct .result-title { color: #22c55e; }
  .result-box.wrong   .result-title { color: #f97316; }

  /* Diff detail */
  .diff-detail {
    font-size: 0.88rem;
    color: #aaa;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-top: 4px;
    border-top: 1px solid #333;
  }

  .diff-row {
    display: flex;
    gap: 8px;
    align-items: baseline;
  }

  .diff-label {
    color: #666;
    min-width: 64px;
    font-size: 0.8rem;
  }

  .diff-word {
    font-family: monospace;
    font-size: 1rem;
    letter-spacing: 0.05em;
  }

  .diff-correct { color: #fff; }
  .diff-wrong-char { color: #f87171; font-weight: 700; text-decoration: underline; }
  .diff-missing { color: #555; }

  /* Buttons row */
  .btn-row {
    display: flex;
    gap: 12px;
  }

  button {
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    transition: opacity 0.15s, transform 0.1s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  #btn-record {
    flex: 1;
    padding: 16px;
    font-size: 1rem;
    background: #3a3a3a;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  #btn-record.recording {
    background: #ef4444;
    animation: pulse 1.2s infinite;
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
    70%  { box-shadow: 0 0 0 12px rgba(239,68,68,0); }
    100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
  }

  #btn-next {
    padding: 16px 22px;
    font-size: 0.95rem;
    background: #2a2a2a;
    color: #aaa;
    border: 1px solid #333;
  }

  #btn-next:hover:not(:disabled) { background: #333; color: #fff; }

  /* Stats */
  .stats {
    background: #1e1e1e;
    border-radius: 12px;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.88rem;
    color: #666;
    border: 1px solid #2a2a2a;
  }

  .stats strong { color: #fff; font-size: 1rem; }

  .rate { font-size: 1.4rem; font-weight: 700; }
  .rate.good { color: #22c55e; }
  .rate.ok   { color: #f59e0b; }
  .rate.bad  { color: #ef4444; }

  /* Interim transcript */
  #interim {
    font-size: 0.82rem;
    color: #555;
    text-align: center;
    min-height: 20px;
  }

  /* Error / notice */
  .notice {
    background: #2a1a1a;
    border: 1px solid #5a2a2a;
    border-radius: 10px;
    padding: 20px;
    color: #f87171;
    font-size: 0.9rem;
    line-height: 1.6;
    text-align: center;
  }

  #word-counter {
    font-size: 0.8rem;
    color: #555;
    text-align: right;
  }
</style>
</head>
<body>

<h1>English Vocabulary Speaking Practice</h1>

<div id="app">
  <p id="loading" style="color:#666;text-align:center;">Loading words…</p>
</div>

<script>
// ── CSV parser ──────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = splitCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h.trim()] = (vals[i] || '').trim(); });
    return obj;
  }).filter(r => r['Word']);
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
      else inQuote = !inQuote;
    } else if (c === ',' && !inQuote) {
      result.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  result.push(cur);
  return result;
}

// ── Speech Recognition setup ────────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

// ── State ────────────────────────────────────────────────────────────────────
let words = [];
let current = null;
let usedIndices = new Set();
let stats = { correct: 0, total: 0 };
let recognition = null;
let isRecording = false;
let speechRate = 1.0;

// ── DOM refs ─────────────────────────────────────────────────────────────────
const app = document.getElementById('app');

// ── Build UI ─────────────────────────────────────────────────────────────────
function buildUI() {
  app.innerHTML = `
    <div id="word-counter"></div>
    <div class="card">
      <div>
        <div class="label">Translation</div>
        <div class="translation" id="translation"></div>
      </div>
      <div>
        <div class="label">Example sentence — say the word aloud</div>
        <div class="example" id="example"></div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <button id="btn-speak" style="flex:1;">🔊 Word</button>
        <button id="btn-speak-sentence" style="flex:1;">🔊 Sentence</button>
        <button id="btn-speed">🐢 Slow</button>
      </div>
    </div>

    <div class="result-box" id="result-box"></div>
    <div id="interim"></div>

    <div class="btn-row">
      <button id="btn-record">🎤 Hold to Speak</button>
      <button id="btn-next">Next →</button>
    </div>

    <div class="stats">
      <div>
        <div style="margin-bottom:2px">Correct <strong id="s-correct">0</strong> / Total <strong id="s-total">0</strong></div>
        <div style="font-size:0.78rem;">Session stats</div>
      </div>
      <div class="rate" id="s-rate">—</div>
    </div>
  `;

  document.getElementById('btn-speak').addEventListener('click', speakWord);
  document.getElementById('btn-speak-sentence').addEventListener('click', speakSentence);
  document.getElementById('btn-speed').addEventListener('click', toggleSpeed);

  document.getElementById('btn-record').addEventListener('mousedown', startRecording);
  document.getElementById('btn-record').addEventListener('touchstart', e => { e.preventDefault(); startRecording(); });
  document.getElementById('btn-record').addEventListener('mouseup', stopRecording);
  document.getElementById('btn-record').addEventListener('touchend', e => { e.preventDefault(); stopRecording(); });
  document.getElementById('btn-record').addEventListener('mouseleave', () => { if (isRecording) stopRecording(); });

  document.getElementById('btn-next').addEventListener('click', nextWord);

  nextWord();
}

// ── Word logic ────────────────────────────────────────────────────────────────
function pickRandom() {
  if (usedIndices.size >= words.length) usedIndices.clear();
  let idx;
  do { idx = Math.floor(Math.random() * words.length); } while (usedIndices.has(idx));
  usedIndices.add(idx);
  return words[idx];
}

function nextWord() {
  if (isRecording) stopRecording();
  current = pickRandom();

  document.getElementById('translation').textContent = current['Translation/Explanation'] || current['Translation'] || '—';
  document.getElementById('example').textContent = current['Example Sentence'] || '(no example sentence)';
  document.getElementById('result-box').className = 'result-box';
  document.getElementById('result-box').innerHTML = '';
  document.getElementById('interim').textContent = '';
  document.getElementById('word-counter').textContent =
    `Practiced ${stats.total} · Library: ${words.length} words`;

  const btn = document.getElementById('btn-record');
  btn.disabled = false;
  btn.textContent = '🎤 Hold to Speak';
  btn.classList.remove('recording');
}

// ── SpeechSynthesis ──────────────────────────────────────────────────────────
function toggleSpeed() {
  const btn = document.getElementById('btn-speed');
  if (speechRate === 1.0) {
    speechRate = 0.7;
    btn.textContent = '🐢 Slow ✓';
    btn.classList.add('slow');
  } else {
    speechRate = 1.0;
    btn.textContent = '🐢 Slow';
    btn.classList.remove('slow');
  }
}

function speakWord() {
  if (!current) return;
  if (!window.speechSynthesis) return;

  window.speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(current['Word']);
  utter.lang = 'en-US';
  utter.rate = speechRate;

  const btn = document.getElementById('btn-speak');
  btn.classList.add('speaking');
  btn.disabled = true;

  utter.onend = () => {
    btn.classList.remove('speaking');
    btn.disabled = false;
  };
  utter.onerror = () => {
    btn.classList.remove('speaking');
    btn.disabled = false;
  };

  window.speechSynthesis.speak(utter);
}

function speakSentence() {
  if (!current || !window.speechSynthesis) return;
  const sentence = current['Example Sentence'];
  if (!sentence) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(sentence);
  utter.lang = 'en-US';
  utter.rate = speechRate;
  const btn = document.getElementById('btn-speak-sentence');
  btn.classList.add('speaking');
  btn.disabled = true;
  utter.onend = () => { btn.classList.remove('speaking'); btn.disabled = false; };
  utter.onerror = () => { btn.classList.remove('speaking'); btn.disabled = false; };
  window.speechSynthesis.speak(utter);
}

// ── Recording ─────────────────────────────────────────────────────────────────
function startRecording() {
  if (isRecording) return;
  if (!SR) return;

  isRecording = true;
  const btn = document.getElementById('btn-record');
  btn.classList.add('recording');
  btn.textContent = '🔴 Listening…';

  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = true;
  recognition.maxAlternatives = 3;
  recognition.continuous = false;

  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    if (interim) document.getElementById('interim').textContent = interim;
    if (final) processResult(final);
  };

  recognition.onerror = (e) => {
    console.warn('SR error', e.error);
    resetRecordBtn();
    if (e.error === 'no-speech') {
      document.getElementById('interim').textContent = 'No speech detected, please try again';
    }
  };

  recognition.onend = () => { resetRecordBtn(); };

  recognition.start();
}

function stopRecording() {
  if (!isRecording || !recognition) return;
  recognition.stop();
}

function resetRecordBtn() {
  isRecording = false;
  const btn = document.getElementById('btn-record');
  if (!btn) return;
  btn.classList.remove('recording');
  btn.textContent = '🎤 Hold to Speak';
}

// ── Comparison ────────────────────────────────────────────────────────────────
function normalize(s) {
  return s.toLowerCase().trim().replace(/[^a-z\s'-]/g, '');
}

// Pick the word from transcript closest to answer (edit-distance heuristic)
function bestMatchWord(transcript, answer) {
  const parts = normalize(transcript).split(/\s+/);
  if (parts.length === 1) return parts[0];
  return parts.reduce((best, w) => {
    return charSimilarity(w, answer) >= charSimilarity(best, answer) ? w : best;
  }, parts[0]);
}

function charSimilarity(a, b) {
  let matches = 0;
  const len = Math.max(a.length, b.length);
  for (let i = 0; i < Math.min(a.length, b.length); i++) {
    if (a[i] === b[i]) matches++;
  }
  return len === 0 ? 1 : matches / len;
}

// Returns HTML string with wrong chars highlighted
function buildDiffHTML(word, answer) {
  const maxLen = Math.max(word.length, answer.length);
  let html = '';
  for (let i = 0; i < maxLen; i++) {
    const wc = word[i];
    const ac = answer[i];
    if (!wc) {
      html += `<span class="diff-missing">_</span>`;
    } else if (wc === ac) {
      html += `<span class="diff-correct">${wc}</span>`;
    } else {
      html += `<span class="diff-wrong-char">${wc}</span>`;
    }
  }
  return html;
}

function buildAnswerDiffHTML(word, answer) {
  const maxLen = Math.max(word.length, answer.length);
  let html = '';
  for (let i = 0; i < maxLen; i++) {
    const wc = word[i];
    const ac = answer[i];
    if (!ac) {
      html += `<span class="diff-missing">_</span>`;
    } else if (wc === ac) {
      html += `<span class="diff-correct">${ac}</span>`;
    } else {
      html += `<span class="diff-wrong-char">${ac}</span>`;
    }
  }
  return html;
}

function processResult(transcript) {
  if (!current) return;
  stats.total++;

  const answer = normalize(current['Word']);
  const spoken = normalize(transcript);
  const correct = spoken === answer || spoken.split(/\s+/).includes(answer);

  if (correct) stats.correct++;
  showResult(correct, transcript.trim());
  updateStats();
  resetRecordBtn();
  document.getElementById('btn-record').disabled = true;
}

function showResult(correct, spokenRaw) {
  const box = document.getElementById('result-box');
  const answer = normalize(current['Word']);

  if (correct) {
    box.className = 'result-box correct';
    box.innerHTML = `
      <div class="result-header">
        <span class="result-icon">✅</span>
        <span class="result-title">Correct! Great pronunciation!</span>
      </div>`;
  } else {
    const spokenNorm = normalize(spokenRaw);
    const bestWord = bestMatchWord(spokenRaw, answer);

    const spokenDiffHTML = buildDiffHTML(bestWord, answer);
    const answerDiffHTML = buildAnswerDiffHTML(bestWord, answer);

    box.className = 'result-box wrong';
    box.innerHTML = `
      <div class="result-header">
        <span class="result-icon">❌</span>
        <span class="result-title">Try again</span>
      </div>
      <div class="diff-detail">
        <div class="diff-row">
          <span class="diff-label">You said:</span>
          <span class="diff-word">${spokenDiffHTML}</span>
        </div>
        <div class="diff-row">
          <span class="diff-label">Correct:</span>
          <span class="diff-word">${answerDiffHTML}</span>
        </div>
      </div>`;
  }
}

function updateStats() {
  document.getElementById('s-correct').textContent = stats.correct;
  document.getElementById('s-total').textContent = stats.total;
  const pct = stats.total ? Math.round(stats.correct / stats.total * 100) : null;
  const rateEl = document.getElementById('s-rate');
  if (pct === null) { rateEl.textContent = '—'; rateEl.className = 'rate'; return; }
  rateEl.textContent = pct + '%';
  rateEl.className = 'rate ' + (pct >= 80 ? 'good' : pct >= 50 ? 'ok' : 'bad');
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  if (!SR) {
    app.innerHTML = `<div class="notice">
      ⚠️ Your browser does not support the Speech Recognition API.<br><br>
      Please open this page in <strong>Google Chrome</strong>.
    </div>`;
    return;
  }

  try {
    const resp = await fetch('./notebooklm_words.csv');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    words = parseCSV(text);
    if (words.length === 0) throw new Error('CSV 無有效資料');
    buildUI();
  } catch (err) {
    app.innerHTML = `<div class="notice">
      ⚠️ Failed to load vocabulary file.<br><br>
      Please confirm <code>notebooklm_words.csv</code> exists in the same directory.<br>
      <small style="color:#888;">(${err.message})</small>
    </div>`;
  }
}

init();
</script>
</body>
</html>
